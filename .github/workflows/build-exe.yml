name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm install nexe
      - name: Transpile ESM to CJS
        run: |
          mkdir -p dist
          npx esbuild server.js --platform=node --format=cjs --outfile=dist/server.js
          npx esbuild config.js --platform=node --format=cjs --outfile=dist/config.js
          npx esbuild db.js --platform=node --format=cjs --outfile=dist/db.js
          for f in modules/*.js; do
            name=$(basename $f)
            npx esbuild "$f" --platform=node --format=cjs --outfile="dist/$name"
          done
          copy public dist/public /E
          copy package.json dist\
      - name: Build EXE with Node.js 14
        run: |
          npx nexe dist/server.js --target windows-x64-14.15.3 --resource "./dist/**/*.js" --resource "./dist/public/**/*" --resource "./dist/package.json" --resource "./node_modules/**/*" --output QQ_Automation.exe
      - uses: actions/upload-artifact@v4
        with:
          name: QQ_Automation
          path: QQ_Automation.exe
