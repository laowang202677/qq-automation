name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx @yao-pkg/pkg server.js --targets node20-win-x64 --output QQ_Automation.exe
      - uses: actions/upload-artifact@v4
        with:
          name: QQ_Automation
          path: QQ_Automation.exe
